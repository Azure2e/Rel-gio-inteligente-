<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criar Conta - Relógio Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center">
    <div class="w-96 bg-slate-900 p-8 rounded-3xl shadow-xl">
        <h2 class="text-3xl font-bold text-center mb-8">Criar Conta</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-600 py-3 rounded-2xl font-semibold mt-6">Cadastrar</button>
        </form>
        <p class="text-center mt-6 text-sm">Já tem conta? <a href="/login/" class="text-cyan-400 hover:underline">Entrar</a></p>
    </div>
</body>
</html>
