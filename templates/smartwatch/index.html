<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relógio Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { 
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e); 
            font-family: 'Inter', sans-serif; 
        }
        
        .watch {
            width: 640px;
            height: 640px;
            background: radial-gradient(circle at 50% 50%, #1e2937, #0f172a);
            border-radius: 50%;
            border: 22px solid #22d3ee;
            box-shadow: 0 0 100px rgba(34, 211, 238, 0.75),
                        inset 0 0 80px rgba(255,255,255,0.25);
            position: relative;
            margin: 40px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: watchPulse 6s ease-in-out infinite;
        }

        @keyframes watchPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        .time { font-size: 6.5rem; font-weight: 700; letter-spacing: -8px; }
        .glow { text-shadow: 0 0 45px rgba(34, 211, 238, 0.95); }

        .heart { animation: heartbeat 1.4s ease-in-out infinite; }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center text-white">

    <!-- Usuário + Sair -->
    <div class="absolute top-8 right-8 flex items-center gap-4 z-50">
        <span class="text-lg">Olá, {{ username }} 👋</span>
        <a href="/logout/" class="bg-red-500 hover:bg-red-600 px-6 py-3 rounded-3xl text-base font-medium">
            Sair
        </a>
    </div>

    <!-- Relógio -->
    <div class="watch">

        <div class="text-center w-[82%]">

            <!-- Hora -->
            <h1 class="time glow">{{ hora }}</h1>
            <p class="text-3xl mt-2 opacity-90">{{ dia_semana }} • {{ data }}</p>

            <!-- Clima -->
            <div class="flex items-center justify-center gap-6 mt-10">
                <img src="https://openweathermap.org/img/wn/{{ icon }}@2x.png" 
                     alt="clima" class="w-24 h-24">
                <div class="text-left">
                    <span class="text-7xl font-light">{{ temperatura }}°C</span>
                    <p class="text-2xl opacity-75">{{ cidade }}</p>
                    <p class="text-base opacity-60">{{ descricao }}</p>
                </div>
            </div>

            <!-- Passos e BPM -->
            <div class="mt-10 grid grid-cols-2 gap-5 w-full px-6">
                <div class="bg-slate-800/60 rounded-3xl p-5">
                    <div class="flex justify-between text-base mb-3">
                        <span>Passos</span>
                        <span class="font-bold">{{ passos }} / {{ meta_passos }}</span>
                    </div>
                    <div class="h-4 bg-slate-700 rounded-full overflow-hidden">
                        <div class="h-4 bg-cyan-400 rounded-full" 
                             style="width: {% widthratio passos meta_passos 100 %}%;"></div>
                    </div>
                </div>

                <div class="bg-slate-800/60 rounded-3xl p-5 flex items-center gap-4">
                    <i class="fas fa-heart text-red-500 text-5xl heart"></i>
                    <div>
                        <span class="text-5xl font-semibold">{{ batimentos }}</span>
                        <span class="text-base block -mt-1">bpm</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Botão Sincronizar (menor e fora do círculo) -->
    <div class="mt-8">
        <a href="/sync-health/" 
           class="inline-flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 px-8 py-4 rounded-3xl text-lg font-medium shadow-xl transition-all">
            <i class="fas fa-sync-alt"></i>
            Sincronizar Smartwatch
        </a>
    </div>

    <script>
        setInterval(() => { location.reload(); }, 60000);
    </script>
</body>
</html>
